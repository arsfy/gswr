openapi: 3.0.3
info:
    title: Goveto Edge Control API
    version: 0.1.0
    description: Control-plane API for managing edge clusters, nodes, sites, certificates, publish, purge and analytics.
servers:
    - url: /
tags:
    - name: analytics
    - name: auth
    - name: certificates
    - name: clusters
    - name: dns
    - name: health
    - name: nodes
    - name: publish
    - name: purge
    - name: session
    - name: sites
paths:
    /api/v1/auth/login:
        post:
            operationId: login
            summary: Login
            description: Authenticate with email, password and optional TOTP code; sets session cookie.
            tags:
                - auth
            security:
                - cookie_session: []
            x-middlewares:
                - Session
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                code:
                                    type: string
                                email:
                                    type: string
                                password:
                                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            email:
                                                type: string
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            role:
                                                $ref: '#/components/schemas/model_UserRole'
                                            status:
                                                $ref: '#/components/schemas/model_UserStatus'
    /api/v1/auth/me:
        get:
            operationId: me
            summary: Current user
            description: Return the authenticated user id from the current session.
            tags:
                - auth
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            uid:
                                                type: string
    /api/v1/auth/register:
        post:
            operationId: register
            summary: Register
            description: Create a new user account when registration is enabled; requires captcha.
            tags:
                - auth
            security:
                - cookie_session: []
            x-middlewares:
                - Session
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                captcha_token:
                                    type: string
                                email:
                                    type: string
                                name:
                                    type: string
                                password:
                                    type: string
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            email:
                                                type: string
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            role:
                                                $ref: '#/components/schemas/model_UserRole'
                                            status:
                                                $ref: '#/components/schemas/model_UserStatus'
    /api/v1/auth/registration-config:
        get:
            operationId: registrationConfig
            summary: Registration config
            description: Return whether registration is enabled and public captcha settings.
            tags:
                - auth
            security:
                - cookie_session: []
            x-middlewares:
                - Session
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            enabled:
                                                type: boolean
    /api/v1/clusters:
        get:
            operationId: listAvailable
            summary: List clusters
            description: List clusters the current user can access and the selected cluster id.
            tags:
                - clusters
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            clusters:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/clusters_clusterChoice'
                                            requires_cluster:
                                                type: boolean
                                            selected_cluster_id:
                                                type: string
        post:
            operationId: create
            summary: Create cluster
            description: Create a new cluster owned by the current user and select it in session.
            tags:
                - clusters
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            cluster:
                                                type: object
                                                properties:
                                                    created_at:
                                                        type: string
                                                        format: date-time
                                                        example: "2026-01-02T15:04:05Z"
                                                    id:
                                                        type: string
                                                    name:
                                                        type: string
                                                    role:
                                                        type: string
                                                        enum:
                                                            - OWNER
                                            selected_cluster_id:
                                                type: string
    /api/v1/clusters/{cluster_id}/analytics/distributions/{dimension}:
        get:
            operationId: ranking
            summary: Ranking / distribution
            description: Rank or distribute traffic by dimension (period, sort, limit query params).
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: dimension
                  in: path
                  required: true
                  schema:
                    type: string
                - name: limit
                  in: query
                  schema:
                    type: number
                - name: period
                  in: query
                  schema:
                    type: string
                - name: site_id
                  in: query
                  schema:
                    type: string
                - name: sort
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/analytics_DistributionItem'
    /api/v1/clusters/{cluster_id}/analytics/nodes/runtime:
        get:
            operationId: nodeRuntime
            summary: Node runtime series
            description: Time-series node runtime metrics (optional node_id filter).
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: node_id
                  in: query
                  schema:
                    type: string
                - name: period
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            period:
                                                type: string
                                            series:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/analytics_NodeRuntimePoint'
    /api/v1/clusters/{cluster_id}/analytics/rankings/{dimension}:
        get:
            operationId: ranking
            summary: Ranking / distribution
            description: Rank or distribute traffic by dimension (period, sort, limit query params).
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: dimension
                  in: path
                  required: true
                  schema:
                    type: string
                - name: limit
                  in: query
                  schema:
                    type: number
                - name: period
                  in: query
                  schema:
                    type: string
                - name: site_id
                  in: query
                  schema:
                    type: string
                - name: sort
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/analytics_DistributionItem'
    /api/v1/clusters/{cluster_id}/analytics/summary:
        get:
            operationId: summary
            summary: Analytics summary
            description: Aggregate request/traffic summary for a time range (from/to).
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: from
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
                - name: site_id
                  in: query
                  schema:
                    type: string
                - name: to
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        $ref: '#/components/schemas/analytics_Summary'
    /api/v1/clusters/{cluster_id}/analytics/top-ips:
        get:
            operationId: top
            summary: Top URLs or IPs
            description: Top ranked URLs or client IPs for a time range.
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: from
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
                - name: limit
                  in: query
                  schema:
                    type: number
                - name: site_id
                  in: query
                  schema:
                    type: string
                - name: to
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/analytics_TopItem'
    /api/v1/clusters/{cluster_id}/analytics/top-urls:
        get:
            operationId: top
            summary: Top URLs or IPs
            description: Top ranked URLs or client IPs for a time range.
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: from
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
                - name: limit
                  in: query
                  schema:
                    type: number
                - name: site_id
                  in: query
                  schema:
                    type: string
                - name: to
                  in: query
                  schema:
                    type: string
                    format: date-time
                    example: "2026-01-02T15:04:05Z"
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/analytics_TopItem'
    /api/v1/clusters/{cluster_id}/analytics/traffic:
        get:
            operationId: traffic
            summary: Traffic series
            description: 'Time-series traffic metrics for a cluster or site (period: 24h or 30d).'
            tags:
                - analytics
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: period
                  in: query
                  schema:
                    type: string
                - name: site_id
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            granularity:
                                                type: string
                                            period:
                                                type: string
                                            series:
                                                type: array
                                                items:
                                                    $ref: '#/components/schemas/analytics_TrafficPoint'
    /api/v1/clusters/{cluster_id}/certificates:
        get:
            operationId: list
            summary: List certificates
            description: List TLS certificates in the cluster (private keys omitted).
            tags:
                - certificates
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/types_Certificate'
        post:
            operationId: upload
            summary: Upload certificate
            description: Upload a certificate and private key pair for the cluster.
            tags:
                - certificates
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                certificate:
                                    type: string
                                name:
                                    type: string
                                private_key:
                                    type: string
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            created_at:
                                                type: string
                                                format: date-time
                                                example: "2026-01-02T15:04:05Z"
                                            expires_at:
                                                type: string
                                                format: date-time
                                                example: "2026-01-02T15:04:05Z"
                                            fingerprint:
                                                type: string
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            updated_at:
                                                type: string
                                                format: date-time
                                                example: "2026-01-02T15:04:05Z"
    /api/v1/clusters/{cluster_id}/dns:
        get:
            operationId: getConfig
            summary: Get DNS config
            description: Return cluster primary hostname and managed DNS provider configuration.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        $ref: '#/components/schemas/types_DNSConfig'
        put:
            operationId: updateConfig
            summary: Update DNS config
            description: Configure or update managed DNS provider settings and enqueue reconciliation.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                credentials:
                                    type: object
                                    additionalProperties:
                                        type: string
                                default_ttl:
                                    type: number
                                enabled:
                                    type: boolean
                                primary_hostname:
                                    type: string
                                provider:
                                    $ref: '#/components/schemas/model_DNSProviderType'
                                proxied:
                                    type: boolean
                                zone:
                                    type: string
                                zone_id:
                                    type: string
            responses:
                "202":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        $ref: '#/components/schemas/types_DNSJob'
        delete:
            operationId: disableConfig
            summary: Disable DNS
            description: Disable managed DNS for the cluster and enqueue cleanup reconciliation.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "202":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        $ref: '#/components/schemas/types_DNSJob'
    /api/v1/clusters/{cluster_id}/dns-lines:
        get:
            operationId: listDNSLines
            summary: List DNS lines
            description: List DNS lines configured for the cluster.
            tags:
                - clusters
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/types_DNSLine'
    /api/v1/clusters/{cluster_id}/dns/jobs:
        get:
            operationId: listJobs
            summary: List DNS sync jobs
            description: List recent DNS sync jobs for the cluster.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/types_DNSJob'
    /api/v1/clusters/{cluster_id}/dns/lines:
        post:
            operationId: createLine
            summary: Create DNS line
            description: Create a DNS line and enqueue reconciliation when managed DNS is enabled.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                id:
                                    type: string
                                name:
                                    type: string
                                provider_code:
                                    type: string
            responses:
                "201":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: object
                                        properties:
                                            id:
                                                type: string
                                            name:
                                                type: string
                                            providerCode:
                                                type: string
    /api/v1/clusters/{cluster_id}/dns/lines/{line_id}:
        delete:
            operationId: deleteLine
            summary: Delete DNS line
            description: Delete a DNS line and enqueue reconciliation when managed DNS is enabled.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
                - name: line_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
    /api/v1/clusters/{cluster_id}/dns/records:
        get:
            operationId: listRecords
            summary: List DNS records
            description: List managed DNS records for the cluster.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/types_DNSRecord'
    /api/v1/clusters/{cluster_id}/dns/sync:
        post:
            operationId: syncNow
            summary: Sync DNS now
            description: Enqueue an immediate DNS reconciliation job.
            tags:
                - dns
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "202":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        $ref: '#/components/schemas/types_DNSJob'
    /api/v1/clusters/{cluster_id}/groups:
        get:
            operationId: listGroups
            summary: List groups
            description: List node groups in the cluster.
            tags:
                - clusters
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    code:
                                        type: string
                                        enum:
                                            - ok
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/types_ClusterGroup'
        post:
            operationId: createGroup
            summary: Create group
            description: Create a node group in the cluster.
            tags:
                - clusters
            security:
                - cookie_session: []
            x-middlewares:
                - Session
                - RequireAuth
                - Require
            parameters:
                - name: cluster_id
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
